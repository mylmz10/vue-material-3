name: sync-master-to-develop

on:
  push:
    branches:
      - master

permissions:
  contents: write
  pull-requests: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create PR from master to develop
        uses: repo-sync/pull-request@v2
        with:
          source_branch: master
          destination_branch: develop
          pr_title: 'chore: sync master into develop'
          pr_body: |
            Automated sync PR created after a push to `master`.
            This keeps `develop` aligned with release updates (`package.json`, `CHANGELOG.md`).
          github_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Find sync PR
        id: find-pr
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR_NUMBER=$(gh pr list --base develop --head master --state open --json number,createdAt --jq 'sort_by(.createdAt) | reverse | .[0].number // empty')
          if [ -z "$PR_NUMBER" ]; then
            echo "No open sync PR found."
            echo "pr_number=" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "Found sync PR #$PR_NUMBER"
          echo "pr_number=$PR_NUMBER" >> "$GITHUB_OUTPUT"

      - name: Auto-merge safe sync PR
        if: steps.find-pr.outputs.pr_number != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR_NUMBER="${{ steps.find-pr.outputs.pr_number }}"
          mapfile -t FILES < <(gh pr view "$PR_NUMBER" --json files --jq '.files[].path')

          if [ "${#FILES[@]}" -eq 0 ]; then
            echo "No files found in PR #$PR_NUMBER. Skipping auto-merge."
            exit 0
          fi

          echo "Changed files in PR #$PR_NUMBER:"
          printf '%s\n' "${FILES[@]}"

          NON_ALLOWED=$(printf '%s\n' "${FILES[@]}" | grep -Ev '^(CHANGELOG\.md|package\.json|package-lock\.json)$' || true)
          if [ -n "$NON_ALLOWED" ]; then
            echo "PR includes non-whitelisted files. Skipping auto-merge."
            printf '%s\n' "$NON_ALLOWED"
            exit 0
          fi

          gh pr merge "$PR_NUMBER" --auto --merge
