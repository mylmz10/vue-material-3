name: release-please

on:
  push:
    branches:
      - master
  workflow_dispatch:
    inputs:
      simulate_publish_failure:
        description: Simulate npm publish failure (for rollback test)
        required: false
        default: false
        type: boolean
      reconcile_tag:
        description: "Reconcile an already-created release tag (example: v0.9.0)"
        required: false
        default: ''
        type: string

jobs:
  build:
    if: ${{ github.event_name == 'push' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

  release-please-pr:
    if: ${{ github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.reconcile_tag == '' && inputs.simulate_publish_failure == true) }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      id-token: write
    steps:
      - id: release
        uses: GoogleCloudPlatform/release-please-action@v4
        with:
          command: manifest
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Normalize release outputs
        id: release-meta
        run: |
          OUTPUTS_JSON='${{ toJSON(steps.release.outputs) }}'
          echo "${OUTPUTS_JSON}" > /tmp/release-please-outputs.json

          RELEASE_CREATED=$(jq -r '[
            .release_created,
            .releases_created,
            .[".--release_created"],
            (to_entries[] | select(.key | endswith("--release_created")) | .value)
          ]
          | map(select(. != null and . != ""))
          | map(ascii_downcase)
          | if any(. == "true") then "true" else "false" end' /tmp/release-please-outputs.json)

          TAG_NAME=$(jq -r '[
            .tag_name,
            .[".--tag_name"],
            (to_entries[] | select(.key | endswith("--tag_name")) | .value)
          ]
          | map(select(. != null and . != ""))
          | .[0] // ""' /tmp/release-please-outputs.json)

          RELEASE_SHA=$(jq -r '[
            .sha,
            .[".--sha"],
            (to_entries[] | select(.key | endswith("--sha")) | .value)
          ]
          | map(select(. != null and . != ""))
          | .[0] // ""' /tmp/release-please-outputs.json)

          echo "release_created=${RELEASE_CREATED}" >> "${GITHUB_OUTPUT}"
          echo "tag_name=${TAG_NAME}" >> "${GITHUB_OUTPUT}"
          echo "sha=${RELEASE_SHA}" >> "${GITHUB_OUTPUT}"

          echo "release_created=${RELEASE_CREATED}"
          echo "tag_name=${TAG_NAME}"
          echo "sha=${RELEASE_SHA}"

      - name: Checkout Repo
        uses: actions/checkout@v4
        if: ${{ steps.release-meta.outputs.release_created == 'true' }}
        with:
          fetch-depth: 0
          ref: master

      - name: Setup Node.js 24.x
        uses: actions/setup-node@v4
        with:
          node-version: 24
        if: ${{ steps.release-meta.outputs.release_created == 'true' }}

      - name: Ensure npm 11.5.1+
        run: |
          npm install -g npm@^11.5.1
          node --version
          npm --version
        if: ${{ steps.release-meta.outputs.release_created == 'true' }}

      - name: Install dependencies
        run: npm ci
        if: ${{ steps.release-meta.outputs.release_created == 'true' }}

      - name: Publish package on NPM 📦
        id: publish
        continue-on-error: true
        if: ${{ steps.release-meta.outputs.release_created == 'true' }}
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ inputs.simulate_publish_failure }}" = "true" ]; then
            echo "Simulating publish failure."
            exit 1
          fi

          npm publish --access public

      - name: Roll back failed release by opening PR
        if: ${{ steps.release-meta.outputs.release_created == 'true' && steps.publish.outcome == 'failure' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: ${{ steps.release-meta.outputs.tag_name }}
          RELEASE_SHA: ${{ steps.release-meta.outputs.sha }}
        run: |
          set -euo pipefail
          echo "Publish failed for ${TAG_NAME}. Cleaning release metadata and opening rollback PR."

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git fetch origin master
          git checkout master
          git reset --hard origin/master

          if gh release view "${TAG_NAME}" >/dev/null 2>&1; then
            gh release delete "${TAG_NAME}" --yes
          fi

          if git ls-remote --exit-code --tags origin "refs/tags/${TAG_NAME}" >/dev/null 2>&1; then
            git push origin ":refs/tags/${TAG_NAME}"
          fi

          TAG_SAFE="${TAG_NAME//./-}"
          TAG_SAFE="${TAG_SAFE//\//-}"
          BRANCH_NAME="ci/rollback-${TAG_SAFE}-${GITHUB_RUN_ID}"
          git checkout -b "${BRANCH_NAME}"

          if ! git revert --no-edit "${RELEASE_SHA}"; then
            git revert --abort || true
            git revert -m 1 --no-edit "${RELEASE_SHA}"
          fi

          git commit --amend -m "chore(ci): rollback failed release ${TAG_NAME}"
          git push origin "${BRANCH_NAME}"

          PR_TITLE="chore(ci): rollback failed release ${TAG_NAME}"
          PR_BODY=$(printf 'npm publish failed for %s in run https://github.com/%s/actions/runs/%s.\nThis PR reverts release commit %s to keep master aligned with npm.\n' "${TAG_NAME}" "${GITHUB_REPOSITORY}" "${GITHUB_RUN_ID}" "${RELEASE_SHA}")

          PR_URL=""
          if ! PR_URL=$(gh pr create \
            --base master \
            --head "${BRANCH_NAME}" \
            --title "${PR_TITLE}" \
            --body "${PR_BODY}"); then
            PR_URL=$(gh pr list \
              --head "${BRANCH_NAME}" \
              --base master \
              --state open \
              --json url \
              --jq '.[0].url // empty')
          fi

          if [ -z "${PR_URL}" ]; then
            echo "Failed to create or resolve rollback PR."
            exit 1
          fi

          echo "Opened rollback PR: ${PR_URL}"

          if ! gh pr merge "${PR_URL}" --auto --merge; then
            echo "Auto-merge could not be enabled. Merge rollback PR manually."
          fi

      - name: Mark workflow as failed after rollback
        if: ${{ steps.release-meta.outputs.release_created == 'true' && steps.publish.outcome == 'failure' }}
        run: |
          echo "Publish failed. Rollback PR was created."
          exit 1

  reconcile-release:
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.reconcile_tag != '' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout master
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: master

      - name: Resolve reconcile tag
        id: resolve
        run: |
          set -euo pipefail
          TAG_NAME="${{ inputs.reconcile_tag }}"
          git fetch --tags origin

          if ! git rev-parse "${TAG_NAME}" >/dev/null 2>&1; then
            echo "Tag ${TAG_NAME} does not exist."
            exit 1
          fi

          RELEASE_SHA="$(git rev-list -n 1 "${TAG_NAME}")"

          echo "tag_name=${TAG_NAME}" >> "$GITHUB_OUTPUT"
          echo "release_sha=${RELEASE_SHA}" >> "$GITHUB_OUTPUT"

      - name: Reconcile release by opening rollback PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: ${{ steps.resolve.outputs.tag_name }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git fetch origin master
          git checkout master
          git reset --hard origin/master

          if gh release view "${TAG_NAME}" >/dev/null 2>&1; then
            gh release delete "${TAG_NAME}" --yes
          fi

          if git ls-remote --exit-code --tags origin "refs/tags/${TAG_NAME}" >/dev/null 2>&1; then
            git push origin ":refs/tags/${TAG_NAME}"
          fi

          RELEASE_SHA="${{ steps.resolve.outputs.release_sha }}"
          TAG_SAFE="${TAG_NAME//./-}"
          TAG_SAFE="${TAG_SAFE//\//-}"
          BRANCH_NAME="ci/reconcile-${TAG_SAFE}-${GITHUB_RUN_ID}"
          git checkout -b "${BRANCH_NAME}"

          if ! git revert --no-edit "${RELEASE_SHA}"; then
            git revert --abort || true
            git revert -m 1 --no-edit "${RELEASE_SHA}"
          fi

          git commit --amend -m "chore(ci): reconcile release ${TAG_NAME}"
          git push origin "${BRANCH_NAME}"

          PR_TITLE="chore(ci): reconcile release ${TAG_NAME}"
          PR_BODY=$(printf 'Reconcile workflow requested for %s in run https://github.com/%s/actions/runs/%s.\nThis PR reverts release commit %s after cleaning release metadata.\n' "${TAG_NAME}" "${GITHUB_REPOSITORY}" "${GITHUB_RUN_ID}" "${RELEASE_SHA}")

          PR_URL=""
          if ! PR_URL=$(gh pr create \
            --base master \
            --head "${BRANCH_NAME}" \
            --title "${PR_TITLE}" \
            --body "${PR_BODY}"); then
            PR_URL=$(gh pr list \
              --head "${BRANCH_NAME}" \
              --base master \
              --state open \
              --json url \
              --jq '.[0].url // empty')
          fi

          if [ -z "${PR_URL}" ]; then
            echo "Failed to create or resolve reconcile PR."
            exit 1
          fi

          echo "Opened reconcile PR: ${PR_URL}"

          if ! gh pr merge "${PR_URL}" --auto --merge; then
            echo "Auto-merge could not be enabled. Merge reconcile PR manually."
          fi
