on:
  push:
    branches:
      - master
name: release-please
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      #- name: install
      #  run: npm ci
      #- name: build
      #  run: npm run build
  release-please-pr:
    runs-on: ubuntu-latest
    needs:
      - build
    permissions:
      contents: write
      pull-requests: write
      id-token: write
    steps:
      - id: release
        uses: GoogleCloudPlatform/release-please-action@v4
        with:
          release-type: node
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Checkout Repo
        uses: actions/checkout@v4
        if: ${{ steps.release.outputs.release_created }}

      - name: Setup Node.js 20.x
        uses: actions/setup-node@v4
        with:
          node-version: 20
        if: ${{ steps.release.outputs.release_created }}
      - name: Publish package on NPM 📦
        env:
          NODE_AUTH_TOKEN: ''
        run: npm publish --provenance --access public
        if: ${{ steps.release.outputs.release_created }}
